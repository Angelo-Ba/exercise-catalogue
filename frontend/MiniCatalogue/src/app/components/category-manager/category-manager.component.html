<div class="form-container" [class.loading-overlay]="loading()">
  <h2>Gestione Categorie</h2>

  <!-- Form di Creazione Rapida -->
  <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()" style="margin-bottom: 30px">
    <div class="field">
      <label>Nuova Categoria *</label>
      <div style="display: flex; gap: 10px">
        <input
          type="text"
          formControlName="name"
          placeholder="Es: Elettronica, Libri..."
          [class.is-invalid]="
            categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched
          "
          style="flex: 1"
        />
        <button type="submit" class="btn-primary" [disabled]="categoryForm.invalid || loading()">
          {{ loading() ? '...' : 'Aggiungi' }}
        </button>
      </div>
      @if (error()) {
        <div class="error-text">{{ error() }}</div>
      }

      @if (categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched) {
        <small class="error-text">Inserire almeno 3 caratteri.</small>
      }
    </div>
  </form>

  <!-- Tabella della Lista Categorie -->
  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th style="width: 100px">ID</th>
          <th>Nome</th>
        </tr>
      </thead>
      <tbody>
        @for (cat of categories(); track cat.id) {
          <tr>
            <td>
              <span class="tag-pill">#{{ cat.id }}</span>
            </td>
            <td>
              <strong>{{ cat.name }}</strong>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="2" style="text-align: center; padding: 20px">
              Nessuna categoria trovata.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
