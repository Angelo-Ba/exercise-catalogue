<div class="form-container">
  <h2>{{ isEditMode() ? 'Modifica' : 'Crea Nuovo' }} Prodotto</h2>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="field">
      <label>Nome Prodotto *</label>
      <input type="text" formControlName="name" required="true" />
    </div>

    <div class="row" style="display: flex; gap: 15px">
      <div class="field" style="flex: 1">
        <label>Prezzo (€)</label>
        <input type="number" formControlName="price" step="0.01" />
      </div>

      <div class="field" style="flex: 1">
        <label>Categoria</label>
        <select formControlName="categoryId">
          <option [ngValue]="null">Seleziona...</option>
          @for (cat of categories(); track cat.id) {
            <option [ngValue]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="field">
      <label>Tags (separati da virgola)</label>
      <input type="text" formControlName="tags" placeholder="es: elettronica, nuovo, offerta" />
      <small class="hint">I tag verranno salvati come elenco separato.</small>
    </div>

    <div class="actions">
      <button type="button" class="btn-secondary" routerLink="/products">Annulla</button>
      <button type="submit" class="btn-primary" [disabled]="productForm.invalid || loading()">
        {{ loading() ? 'Salvataggio...' : 'Salva Prodotto' }}
      </button>
    </div>
  </form>
</div>
